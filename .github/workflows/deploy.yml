name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          echo "VITE_USE_MOCK=true" > .env.production
          echo "VITE_API_URL=/admin" >> .env.production
          echo "VITE_VERSION=1.0.0" >> .env.production
          cat .env.production

      - name: Build
        run: npm run build:gh-pages
        env:
          GITHUB_PAGES: true
          GITHUB_REPOSITORY: zhoujian-513/zhsw-ai-web
          NODE_ENV: production
          VITE_USE_MOCK: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
